# Sigil dashboard configuration.
#
# Edit this file to change which widgets render where. The FastAPI process
# loads it once at startup (when DASHBOARD_ENABLED=true) and the
# RefreshOrchestrator drives each widget's fetch on a 60s tick. Cache TTLs
# below are per-widget hints; see src/sigil/dashboard/cache.py for the
# parser (NNs/m/h/d or the named aliases hourly/daily).
#
# backtest_results lives in widgets/ but is not wired into any page yet —
# add it here once a backtest harness produces persistent runs.

pages:
  - name: command-center
    title: Command Center
    default: true
    columns:
      - size: full
        widgets:
          - type: bankroll_summary
            cache: 1m
          - type: signal_queue
            cache: 30s
            limit: 5
            min_edge: 0.05
      - size: small
        widgets:
          - type: system_health_strip
            cache: 1m
          - type: recent_activity
            cache: 30s
            limit: 20

  # The old `markets` page is superseded by the standalone /markets
  # route (sigil.dashboard.views.markets_list), which supports search,
  # multi-filter, archive toggle, and pagination across all rows. The
  # mount layer hides any YAML page named `markets` from the topbar.

  - name: spreads
    title: Cross-platform spreads
    columns:
      - size: full
        widgets:
          - type: cross_platform_spreads
            cache: 5m
            limit: 25
            min_score: 95
            max_yes_diff: 0.30

  # The old `models` page is superseded by the standalone /models route
  # (sigil.dashboard.views.models_list), which renders a card grid one
  # per registered model and links into /models/{id} for the per-model
  # detail view (equity curve, recent trades, recent predictions). The
  # mount layer hides any YAML page named `models` from the topbar.
  # The model_roi_curve / model_calibration / model_brier widgets are
  # still registered in code if a future page wants to wire them.

  - name: health
    title: Data Health
    columns:
      - size: full
        widgets:
          - type: system_health_strip
            cache: 30s
          - type: source_health_table
            cache: 1m
          - type: error_log
            cache: 1m
            limit: 50
          - type: recent_activity
            cache: 1m
            limit: 50

theme:
  background: "#1b1b1d"
  surface: "#201f21"
  accent: "#d2bbff"
  positive: "#10b981"
  negative: "#ef4444"
