{% extends "base.html" %}
{% block title %}Not found{% endblock %}
{% block content %}
<section class="page">
  <header class="page__header">
    <h1 class="page__title">Page not found</h1>
  </header>
  <div class="empty-state">
    <p>The page <code>{{ requested_name }}</code> isn't configured in <code>dashboard.yaml</code>.</p>
    <p><a class="link" href="/">Back to the default page.</a></p>
  </div>
</section>
{% endblock %}
